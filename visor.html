<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Gol - Visor Pro</title>
    <style>
        /* Fondo oscuro y centrado */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #020617; 
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        
        /* Contenedor con margen, bordes redondeados y sombra */
        .contenedor-reproductor { 
            position: relative; 
            width: 95%; /* Margen lateral */
            max-width: 900px; /* Tamaño máximo para que no se vea gigante en PC */
            aspect-ratio: 16 / 9; /* Mantiene el tamaño de video siempre */
            background: #000;
            border-radius: 15px; /* Esquinas redondeadas */
            overflow: hidden; /* Corta el contenido del iframe para que respete las esquinas */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(34, 197, 94, 0.2);
            border: 1px solid #1e293b; /* Borde sutil como tu agenda */
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* Botón Fullscreen mejorado */
        .btn-fullscreen {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 100;
            background-color: rgba(34, 197, 94, 0.9); /* Verde Nova Gol */
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-fullscreen:hover {
            background-color: #16a34a;
            transform: scale(1.05);
        }

        .loading-msg { color: #64748b; font-size: 12px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="contenedor-reproductor">
        <!-- Botón Fullscreen -->
        <button class="btn-fullscreen" onclick="toggleFullscreen()">Ampliar Pantalla</button>

        <div id="player-area" style="width: 100%; height: 100%;">
            <script>
                const urlParams = new URLSearchParams(window.location.search);
                const embed = urlParams.get('embed');
                
                if (embed) {
                    document.write('<iframe id="my_iframe" src="reproduc.html?embed=' + embed + '" ' +
                        'sandbox="allow-same-origin allow-scripts allow-presentation allow-forms" ' +
                        'allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>');
                } else {
                    document.write('<div class="loading-msg">Esperando señal de video...</div>');
                }
            </script>
        </div>
    </div>

    <script>
        function toggleFullscreen() {
            let elem = document.getElementById("my_iframe");
            if (!elem) return;

            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) { elem.requestFullscreen(); } 
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
                else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        // Cambiar estilo del botón al entrar/salir de pantalla completa
        document.addEventListener('fullscreenchange', () => {
            const btn = document.querySelector('.btn-fullscreen');
            if (document.fullscreenElement) {
                btn.style.display = "none"; // Ocultar botón en modo cine para que no estorbe
            } else {
                btn.style.display = "block";
            }
        });
    </script>
</body>
</html>
