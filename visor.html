<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Libre - Visor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            background: #020617; 
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* Header */
        .header-visor {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1e293b;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Reproductor */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px 0;
        }

        .contenedor-reproductor { 
            position: relative; 
            width: 95%; 
            max-width: 900px; 
            aspect-ratio: 16 / 9; 
            background: #000;
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(34, 197, 94, 0.15);
            border: 1px solid #1e293b;
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* Botón */
        .btn-fullscreen {
            margin: 20px 0;
            background-color: rgba(34, 197, 94, 0.9);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        /* Footer */
        .footer-visor {
            width: 100%;
            padding: 20px;
            border-top: 1px solid #1e293b;
            text-align: center;
            background: #0f172a;
        }

        .animate-pulse-fast {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body>

    <header class="header-visor">
        <div class="header-container">
            <h1 class="text-xl font-[900] text-white tracking-tighter uppercase">FUTBOL <span class="text-green-500">LIBRE</span></h1>
            <div class="text-[9px] bg-slate-800 px-2 py-1 rounded text-green-500 font-bold uppercase tracking-widest border border-slate-700 animate-pulse-fast">
                ● EN VIVO
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="contenedor-reproductor">
            <script>
                const urlParams = new URLSearchParams(window.location.search);
                const embed = urlParams.get('embed');
                if (embed) {
                    document.write('<iframe id="my_iframe" src="reproduc.html?embed=' + embed + '" ' +
                        'sandbox="allow-same-origin allow-scripts allow-presentation allow-forms" ' +
                        'allowfullscreen="true"></iframe>');
                }
            </script>
        </div>

        <button class="btn-fullscreen" onclick="toggleFullscreen()">Ampliar Pantalla</button>
    </main>

    <footer class="footer-visor">
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">
            © 2026 <span class="text-white">FUTBOL LIBRE</span> - NOVA GOL
        </p>
    </footer>

    <script>
        function toggleFullscreen() {
            let elem = document.getElementById("my_iframe");
            if (!elem) return;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) { elem.requestFullscreen(); } 
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const header = document.querySelector('.header-visor');
            const footer = document.querySelector('.footer-visor');
            const btn = document.querySelector('.btn-fullscreen');
            if (document.fullscreenElement) {
                header.style.display = "none";
                footer.style.display = "none";
                btn.style.display = "none";
            } else {
                header.style.display = "block";
                footer.style.display = "block";
                btn.style.display = "block";
            }
        });
    </script>
</body>
</html>
