<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Gol - Visor Pro</title>
    <style>
        /* Fondo oscuro y estructura en columna para el botón arriba */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #020617; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        
        /* Contenedor del botón (fuera y arriba) */
        .header-visor {
            width: 95%;
            max-width: 900px;
            margin-bottom: 12px; /* Espacio entre botón y video */
            display: flex;
            justify-content: flex-start;
        }

        /* Botón Fullscreen (Tus colores y estilos originales) */
        .btn-fullscreen {
            z-index: 100;
            background-color: rgba(34, 197, 94, 0.9); /* Verde Nova Gol */
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-fullscreen:hover {
            background-color: #16a34a;
            transform: scale(1.05);
        }

        /* Contenedor con margen, bordes redondeados y sombra */
        .contenedor-reproductor { 
            position: relative; 
            width: 95%; 
            max-width: 900px; 
            aspect-ratio: 16 / 9; 
            background: #000;
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(34, 197, 94, 0.2);
            border: 1px solid #1e293b;
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        .loading-msg { color: #64748b; font-size: 12px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Botón movido arriba -->
    <div class="header-visor">
        <button class="btn-fullscreen" onclick="toggleFullscreen()">Ampliar Pantalla</button>
    </div>

    <div class="contenedor-reproductor">
        <div id="player-area" style="width: 100%; height: 100%;">
            <script>
                const urlParams = new URLSearchParams(window.location.search);
                const embed = urlParams.get('embed');
                
                if (embed) {
                    document.write('<iframe id="my_iframe" src="reproduc.html?embed=' + embed + '" ' +
                        'sandbox="allow-same-origin allow-scripts allow-presentation allow-forms" ' +
                        'allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>');
                } else {
                    document.write('<div class="loading-msg">Esperando señal de video...</div>');
                }
            </script>
        </div>
    </div>

    <script>
        function toggleFullscreen() {
            let elem = document.getElementById("my_iframe");
            if (!elem) return;

            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) { elem.requestFullscreen(); } 
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
                else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const btnContainer = document.querySelector('.header-visor');
            if (document.fullscreenElement) {
                btnContainer.style.display = "none"; 
            } else {
                btnContainer.style.display = "flex";
            }
        });
    </script>
</body>
</html>
