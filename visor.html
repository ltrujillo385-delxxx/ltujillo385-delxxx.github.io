<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Libre - Visor Pro</title>
    <!-- Importamos Tailwind y la fuente Inter para que el título sea idéntico -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #020617; 
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* Estilo del Header igual al de la agenda */
        .header-visor {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.9); /* slate-900/90 */
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1e293b;
            padding: 1rem;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 1.25rem; /* text-xl */
            font-weight: 900;
            color: white;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .logo-green { color: #22c55e; }

        /* Indicador EN VIVO */
        .live-indicator {
            font-size: 9px;
            background-color: #1e293b;
            padding: 4px 8px;
            border-radius: 4px;
            color: #22c55e;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid #334155;
        }

        /* Contenedor del video con márgenes y bordes redondeados */
        .contenedor-reproductor { 
            position: relative; 
            width: 95%; 
            max-width: 900px; 
            aspect-ratio: 16 / 9; 
            background: #000;
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(34, 197, 94, 0.15);
            border: 1px solid #1e293b;
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* Botón Fullscreen (Estilo verde Nova Gol) */
        .btn-fullscreen {
            margin-top: 15px;
            background-color: rgba(34, 197, 94, 0.9);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-fullscreen:hover { background-color: #16a34a; transform: scale(1.05); }

        .animate-pulse-fast {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body>

    <!-- Header idéntico a la Agenda -->
    <header class="header-visor">
        <div class="header-container">
            <h1 class="logo-text">FUTBOL <span class="logo-green">LIBRE</span></h1>
            <div class="live-indicator animate-pulse-fast">● EN VIVO</div>
        </div>
    </header>

    <div class="contenedor-reproductor">
        <div id="player-area" style="width: 100%; height: 100%;">
            <script>
                const urlParams = new URLSearchParams(window.location.search);
                const embed = urlParams.get('embed');
                
                if (embed) {
                    document.write('<iframe id="my_iframe" src="reproduc.html?embed=' + embed + '" ' +
                        'sandbox="allow-same-origin allow-scripts allow-presentation allow-forms" ' +
                        'allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>');
                } else {
                    document.write('<div style="color:#64748b; text-align:center; padding-top:20%; font-size:12px;">Cargando reproductor...</div>');
                }
            </script>
        </div>
    </div>

    <!-- Botón de ampliar pantalla abajo del video -->
    <button class="btn-fullscreen" onclick="toggleFullscreen()">Ampliar Pantalla</button>

    <script>
        function toggleFullscreen() {
            let elem = document.getElementById("my_iframe");
            if (!elem) return;

            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) { elem.requestFullscreen(); } 
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
                else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        // Auto-ocultar header si entras en pantalla completa
        document.addEventListener('fullscreenchange', () => {
            const header = document.querySelector('.header-visor');
            const btn = document.querySelector('.btn-fullscreen');
            if (document.fullscreenElement) {
                header.style.display = "none";
                btn.style.display = "none";
            } else {
                header.style.display = "block";
                btn.style.display = "block";
            }
        });
    </script>
</body>
</html>
