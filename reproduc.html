<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        .loader-spin { border: 2px solid #22c55e; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; border-bottom-color: transparent; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader-spin mb-3"></div>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sincronizando...</p>
    </div>

    <script>
        function getParameterByName(name) {
            var regex = new RegExp("[\\?&]" + name + "=([^&#]*)"),
                results = regex.exec(location.search);
            return results === null ? "" : decodeURIComponent(results[1]);
        }

        var embed = getParameterByName("embed");
        if (embed) {
            try {
                var urlReal = atob(embed);
               
                document.write('<iframe id="video" src="' + urlReal + '" allow="autoplay; fullscreen" referrerpolicy="no-referrer"></iframe>');
                
                setTimeout(function() {
                    var loader = document.getElementById('loading');
                    if(loader) loader.style.opacity = '0';
                    setTimeout(function() { if(loader) loader.style.display = 'none'; }, 500);
                }, 3000);
            } catch (e) {
                document.write('<div style="color:red;text-align:center;">Error de decodificación</div>');
            }
        }
    </script>
</body>
</html>
